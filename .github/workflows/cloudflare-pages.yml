name: Cloudflare Pages

on:
  push:
    branches:
      - main
      - "**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLOUDCONVERT_API_KEY: ${{ secrets.CLOUDCONVERT_API_KEY }}
          PDFCO_API_KEY: ${{ secrets.PDFCO_API_KEY }}
          MINDEE_API_KEY: ${{ secrets.MINDEE_API_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            pages deploy .vercel/output/static
            --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }}
            ${{ github.ref == 'refs/heads/main' && '--branch=main' || format('--branch={0}', github.ref_name) }}
